<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily</title>
    <style>
        /* Base styles */
        body { margin: 0; height: 100vh; background-color: #050505; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; color: white; }
        .tabs { position: fixed; top: 0; right: 0; bottom: 0; width: 220px; display: flex; flex-direction: column; gap: 8px; background: rgba(255, 255, 255, 0.05); padding: 20px; overflow-y: auto; backdrop-filter: blur(10px); z-index: 100; border-left: 1px solid rgba(255,255,255,0.1); scrollbar-width: none; -ms-overflow-style: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { background: transparent; border: 1px solid rgba(255, 255, 255, 0.3); color: white; padding: 10px 14px; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-weight: 500; outline: none; font-size: 13px; text-align: left; }
        .tab.active, .tab:hover { background: white; color: black; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        
        .scene { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; padding-right: 260px; box-sizing: border-box; }
        
        .eye-container { display: flex; gap: 60px; position: relative; }

        /* 1. 物理 TFT 屏幕 (硬件边框约束) */
        .eye { 
            width: 160px; height: 160px; 
            background-color: transparent; 
            border-radius: 50%; 
            position: relative; 
            overflow: hidden; 
        }
        
        /* 瞬目反射 (眼睑) */
        .eyelid-top, .eyelid-bottom {
            position: absolute;
            left: 0;
            width: 100%;
            background-color: #080808; 
            z-index: 10; 
        }
        .eyelid-top {
            top: 0;
            height: 85%;
            border-bottom-left-radius: 50% 8%;
            border-bottom-right-radius: 50% 8%;
            transform: translateY(-100%);
        }
        .eyelid-bottom {
            bottom: 0;
            height: 25%;
            border-top-left-radius: 50% 10%;
            border-top-right-radius: 50% 10%;
            transform: translateY(100%);
        }

        .eye.is-blinking .eyelid-top { animation: blink-top var(--blink-dur, 0.3s) forwards; }
        .eye.is-blinking .eyelid-bottom { animation: blink-bottom var(--blink-dur, 0.3s) forwards; }

        /* 左眼和右眼添加微小的神经延迟 */
        .eye:nth-child(2).is-blinking .eyelid-top, 
        .eye:nth-child(2).is-blinking .eyelid-bottom {
            animation-delay: 0.04s;
        }

        @keyframes blink-top {
            0% { transform: translateY(-100%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); } 
            35%, 40% { transform: translateY(0%); animation-timing-function: cubic-bezier(0.1, 0.8, 0.3, 1); } 
            100% { transform: translateY(-100%); }
        }
        @keyframes blink-bottom {
            0% { transform: translateY(100%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
            35%, 40% { transform: translateY(0%); animation-timing-function: cubic-bezier(0.1, 0.8, 0.3, 1); }
            100% { transform: translateY(100%); }
        }

        /* 使用专门的裁剪容器作为真实的眼白图层，避免抗锯齿白边透出 */
        .sclera-clip {
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            background-color: #f4f4f4;
            border-radius: 50%;
            overflow: hidden;
            z-index: 1;
            /* 修复 Webkit 渲染下的裁剪白边问题 */
            -webkit-mask-image: -webkit-radial-gradient(white, black);
            /* 跟随眼白图层一起做视差位移，保证裁剪区域与视觉上的眼白完全重合 */
            transform: translate(var(--sclera-x, 0px), var(--sclera-y, 0px));
        }

        /* 使用 ::after 作为内阴影遮罩层，盖在瞳孔上方，增强 3D 立体感并遮挡边缘 */
        .eye::after {
            content: '';
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border-radius: 50%;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
            z-index: 3;
            pointer-events: none;
            transform: translate(var(--sclera-x, 0px), var(--sclera-y, 0px));
        }

        /* 眼珠/瞳孔 基础样式 */
        .pupil {
            width: 70px; height: 70px;
            background-color: transparent;
            border-radius: 50%;
            position: absolute; top: 50%; left: 50%;
            margin-left: -35px; margin-top: -35px;
            z-index: 2;
        }
        
        /* 使用伪元素作为眼珠背景，利用 transform 缩放避免 Layout 重排卡顿 */
        .pupil::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 70px; height: 70px;
            background-color: #000;
            border-radius: 50%;
            transform: translate(calc(-50% + var(--bg-offset-x, 0px)), calc(-50% + var(--bg-offset-y, 0px))) scaleX(var(--bg-scale-x, 1)) scaleY(var(--bg-scale-y, 1));
            z-index: -1;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .pupil.no-transition::before {
            transition: none;
        }

        /* --- 特殊形变类 (Shape Classes) --- */
        
        /* 1. 星星眼 (Sphere 风格：巨大椭圆 + 内部星光) */
        .pupil.shape-star {
        }

        /* 星星高光容器 (仅在星星眼模式下显示) */
        .star-highlights {
            display: none;
            width: 110px; height: 110px;
            position: absolute; top: 50%; left: 50%;
            transform: translate(calc(-50% + var(--bg-offset-x, 0px)), calc(-50% + var(--bg-offset-y, 0px)));
            pointer-events: none;
        }
        .pupil.shape-star .star-highlights {
            display: block;
        }

        /* 泪光容器 (仅在眼泪汪汪模式下显示) */
        .tear-highlights {
            display: none;
            width: 110px; height: 110px;
            position: absolute; top: 50%; left: 50%;
            transform: translate(calc(-50% + var(--bg-offset-x, 0px)), calc(-50% + var(--bg-offset-y, 0px)));
            pointer-events: none;
        }
        .pupil.shape-teary .tear-highlights {
            display: block;
        }

        /* 眼泪汪汪的各种高光形状 */
        .tear-shine {
            position: absolute;
            background-color: white;
            border-radius: 48% 52% 47% 53% / 52% 48% 53% 47%;
            transform-origin: center center;
            opacity: 1; 
            animation: tear-morph 3s ease-in-out infinite;
        }

        @keyframes tear-morph {
            0%   { border-radius: 48% 52% 47% 53% / 52% 48% 53% 47%; }
            25%  { border-radius: 54% 46% 53% 47% / 46% 54% 48% 52%; }
            50%  { border-radius: 46% 54% 45% 55% / 55% 45% 56% 44%; }
            75%  { border-radius: 51% 49% 55% 45% / 49% 51% 45% 55%; }
            100% { border-radius: 48% 52% 47% 53% / 52% 48% 53% 47%; }
        }

        /* 泪光 - 主高光 (左侧偏上的大水滴) */
        .tear-main {
            width: 56px; height: 56px; 
            top: 10%; left: 15%; 
            transform: scaleX(var(--tear-scale-x, 1)) scaleY(var(--tear-scale-y, 1));
            animation-duration: 3.2s;
        }

        /* 泪光 - 次高光1 */
        .tear-sub1 {
            width: 32px; height: 32px; 
            bottom: 4.5%; right: 36%; 
            transform: translate(var(--slide-x, 0px), var(--slide-y, 0px)) scaleX(var(--tear-scale-y, 1)) scaleY(var(--tear-scale-x, 1));
            animation-duration: 2.7s;
        }

        /* 泪光 - 次高光2 */
        .tear-sub2 {
            width: 28px; height: 28px; 
            bottom: 34%; right: 6.5%; 
            transform: translate(var(--slide-x, 0px), var(--slide-y, 0px)) scaleX(var(--tear-scale-x, 1)) scaleY(var(--tear-scale-y, 1));
            animation-duration: 3.5s;
        }

        /* 模式说明浮层 */
        .desc-overlay {
            position: fixed; top: 40px; left: calc(50% - 130px); transform: translateX(-50%);
            text-align: center; max-width: 800px; width: 90%;
            background: rgba(0,0,0,0.4); padding: 20px 30px; border-radius: 15px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none; z-index: 50;
        }
        .desc-title { font-size: 22px; font-weight: bold; margin-bottom: 12px; color: #fff; letter-spacing: 1px; }
        .desc-text { font-size: 15px; color: #ddd; line-height: 1.6; }
        .desc-emotion { display: none; }
    </style>
</head>
<body>
    <div class="desc-overlay">
        <div class="desc-title" id="mode-title">1. 扫视机制 (Saccades)</div>
        <div class="desc-text" id="mode-desc">瞬间的位移爆发，速度极快（弹道式），没有中间缓冲，干脆利落。</div>
        <div class="desc-emotion" id="mode-emotion">情绪外显：机警、神经质、突然发现新大陆、鬼鬼祟祟。</div>
    </div>

    <div class="scene">
        <div class="eye-container" id="head-container">
            <div class="eye">
                <div class="eyelid-top"></div><div class="eyelid-bottom"></div>
                <div class="sclera-clip">
                    <div class="pupil" id="pupil-l">
                        <div class="tear-highlights">
                            <div class="tear-shine tear-main"></div>
                            <div class="tear-shine tear-sub1"></div>
                            <div class="tear-shine tear-sub2"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="eye">
                <div class="eyelid-top"></div><div class="eyelid-bottom"></div>
                <div class="sclera-clip">
                    <div class="pupil" id="pupil-r">
                        <div class="tear-highlights">
                            <div class="tear-shine tear-main"></div>
                            <div class="tear-shine tear-sub1"></div>
                            <div class="tear-shine tear-sub2"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab" onclick="setMode(0, event)">▶ 实机 (Auto Play)</button>
        <button class="tab active" onclick="setMode(101, event)">1. 扫视 (Saccades)</button>
        <button class="tab" onclick="setMode(102, event)">2. 跟踪 (Pursuit)</button>
        <button class="tab" onclick="setMode(103, event)">3. 困倦 (Sleepy)</button>
        <button class="tab" onclick="setMode(105, event)">4. 疲劳 (Flutter)</button>
        <button class="tab" onclick="setMode(106, event)">6. 心虚 (Guilty)</button>
        <button class="tab" onclick="setMode(107, event)">7. 无助 (Terrified)</button>
        <button class="tab" onclick="setMode(108, event)">8. 速读 (Typewriter)</button>
        <button class="tab" onclick="setMode(109, event)">9. 偷摸 (Sneaky)</button>
        <button class="tab" onclick="setMode(110, event)">10. 救命 (Panicked)</button>
        <button class="tab" onclick="setMode(111, event)">11. 扫描 (Scanner)</button>
        <button class="tab" onclick="setMode(112, event)">12. 呆呆 (Cross-eyed)</button>
        <button class="tab" onclick="setMode(113, event)">13. 不屑 (Elevator Look)</button>
        <button class="tab" onclick="setMode(114, event)">14. 抖眉 (Eyebrow Dance)</button>
        <button class="tab" onclick="setMode(115, event)">15. 催眠 (Dizzy)</button>
        <button class="tab" onclick="setMode(116, event)">16. 偷看 (Sneaky)</button>
        <button class="tab" onclick="setMode(117, event)">17. 虚脱 (Soul Leaving)</button>
        <button class="tab" onclick="setMode(118, event)">18. 大葱明 (Derpy Eyes)</button>
        <button class="tab" onclick="setMode(120, event)">20. 乒乒乓乓 (Ping-Pong)</button>
        <button class="tab" onclick="setMode(121, event)">21. 苍蝇飞飞 (Buzzing Fly)</button>
        <button class="tab" onclick="setMode(122, event)">22. 眼泪汪汪 (Teary Eyes)</button>
    </div>

    <script>
        // 定义 T0, T1, T2 层级的表情 ID
        const TIER_0 = [101, 102]; // 扫视, 跟踪
        const TIER_1 = [103, 105, 106, 108, 109, 118, 111, 112, 113, 114, 115, 116]; // 困倦, 疲劳, 心虚, 速读, 偷摸, 大葱明, 扫描, 呆呆, 不屑, 抖眉, 催眠, 偷看
        const TIER_2 = [107, 120, 110, 121, 117, 122]; // 无助, 乒乒乓乓, 救命, 苍蝇飞飞, 虚脱, 眼泪汪汪

        const modes = {
        0: { t: "▶ 实机 (Auto Play)", d: "根据概率和规则自动轮播所有表情，展现真实的生命力。", e: "状态：待机自律", shape: "" },
        101: { t: "1. 扫视 (Saccades)", d: "瞬间的位移爆发，速度极快（弹道式），没有中间缓冲，干脆利落。", e: "" },
        102: { t: "2. 跟踪 (Pursuit)", d: "优雅的视线咬合。眼球平滑追踪一个随机游走的虚拟目标，模拟真实的追视行为。", e: "" },
        103: { t: "3. 困倦 (Sleepy)", d: "肌肉控制力下降，眼球缓慢向下沉降，伴随沉重缓慢的眨眼。", e: "" },
        105: { t: "4. 疲劳 (Flutter)", d: "眼神逐渐涣散发呆，随后突然发生短促的原地高频剧烈晃动，犹如被电击后瞬间清醒。", e: "" },
        106: { t: "6. 心虚 (Guilty)", d: "眼珠迅速在右下角和左下角之间来回切换，躲避视线接触。", e: "" },
        107: { t: "7. 无助 (Terrified)", d: "两只眼珠紧紧缩在一起，躲在眼眶的最角落，瞳孔缩小，伴随持续的高频剧烈微颤。", e: "" },
        108: { t: "8. 速读 (Typewriter)", d: "眼珠分多行向右一格一格跳跃，每读完一行迅速平滑地滑回左侧下一行。", e: "" },
        109: { t: "9. 偷摸 (Sneaky)", d: "眼珠极慢、极平滑地贴着底部在左右极限之间滑动，充满黏滞感与警惕感。", e: "" },
        110: { t: "10. 救命 (Panicked)", d: "眼珠在底部两端之间飞速来回扫视，极度短促。", e: "" },
        111: { t: "11. 扫描 (Scanner)", d: "左右眼完全同步，像机械雷达一样在水平线上匀速往复直线运动。", e: "" },
        112: { t: "12. 呆呆 (Cross-eyed)", d: "两眼同时向内侧、下方集中，偶尔微弱抽动。", e: "" },
        113: { t: "13. 不屑 (Elevator Look)", d: "视线压低，从下到上缓慢扫视一次，然后迅速回中并伴随极小的白眼。", e: "" },
        114: { t: "14. 抖眉 (Eyebrow Dance)", d: "左眼和右眼交替以极快的速度在原地上下一抖。", e: "" },
        115: { t: "15. 催眠 (Dizzy)", d: "左右眼同步在底部沿着半圆弧线像老式座钟一样缓慢摇摆。", e: "" },
        116: { t: "16. 偷看 (Sneaky)", d: "眼珠仅在眼眶最顶部边缘，像机械雷达一样分段式左右扫视。", e: "" },
        117: { t: "17. 虚脱 (Soul Leaving)", d: "眼珠像失去重力般极其缓慢地向上漂浮，到达顶点后突然失去所有支撑，瞬间砸到眼眶底部并瘫软。", e: "" },
        118: { t: "18. 大葱明 (Derpy Eyes)", d: "完全打破双眼同步，左右眼各自缓慢游走，不需要任何形变。", e: "" },
        120: { t: "20. 乒乒乓乓 (Ping-Pong)", d: "眼珠在极左和极右之间来回切换，节奏越来越快，最后快到崩溃乱转。", e: "" },
        121: { t: "21. 苍蝇飞飞 (Buzzing Fly)", d: "斗鸡眼状态下，追随一只看不见的苍蝇画不规则8字型。", e: "" },
        122: { t: "22. 眼泪汪汪 (Teary Eyes)", d: "眼眶中蓄满泪水，闪烁着大面积的圆润高光。楚楚可怜，委屈巴巴。", e: "情绪外显：委屈、感动、要哭了", shape: "shape-teary" }
    };

        // State variables
        let currentMode = 101;
        let internalMode = 101; // 实机模式下，实际正在播放的模式
        let time = 0;
        let mouseX = 0, mouseY = 0;
        
        // Auto Play variables
        let autoPlayTimer = null;
        let lastPlayedTier = 0;
        let recentPlayed = []; // 记录最近播放的表情ID，用于冷却机制
        
        // Physical states
        let pL = { x: 0, y: 0, tx: 0, ty: 0 };
        let pR = { x: 0, y: 0, tx: 0, ty: 0 };
        let head = { x: 0, y: 0, tx: 0, ty: 0 };
        let lastSaccadeTime = 0;
        let flutterEndTime = 0;
        let pursuit = { x: 0, y: 0, tx: 0, ty: 0, nextTime: 0 };
        let modeStartTime = 0;
        let lastBlinkLoop = -1;

        const titleEl = document.getElementById('mode-title');
        const descEl = document.getElementById('mode-desc');
        const emotionEl = document.getElementById('mode-emotion');
        const pupilL = document.getElementById('pupil-l');
        const pupilR = document.getElementById('pupil-r');
        const headContainer = document.getElementById('head-container');

        const tearHlL = pupilL.querySelector('.tear-highlights');
        const tearHlR = pupilR.querySelector('.tear-highlights');
        const lTearMain = pupilL.querySelector('.tear-main');
        const lTearSub1 = pupilL.querySelector('.tear-sub1');
        const lTearSub2 = pupilL.querySelector('.tear-sub2');
        const rTearMain = pupilR.querySelector('.tear-main');
        const rTearSub1 = pupilR.querySelector('.tear-sub1');
        const rTearSub2 = pupilR.querySelector('.tear-sub2');

        function setMode(m, e) {
            currentMode = m;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if(e) e.currentTarget.classList.add('active');
            
            titleEl.innerText = modes[m].t;
            descEl.innerText = modes[m].d;
            emotionEl.innerText = modes[m].e;

            clearTimeout(autoPlayTimer);
            if (m === 0) {
                // 进入实机模式，重置状态并启动轮播
                lastPlayedTier = 0;
                recentPlayed = [];
                triggerNextAutoPlay();
                return; // triggerNextAutoPlay 会处理底层状态切换
            } else {
                internalMode = m;
            }
            
            applyInternalMode(internalMode);
        }

        function applyInternalMode(m) {
            pupilL.className = 'pupil ' + (modes[m].shape || '');
            pupilR.className = 'pupil ' + (modes[m].shape || '');

            if (m === 32 || m === 122) {
                pupilL.classList.add('no-transition');
                pupilR.classList.add('no-transition');
            } else {
                pupilL.classList.remove('no-transition');
                pupilR.classList.remove('no-transition');
                pupilL.style.setProperty('--bg-scale-x', 1);
                pupilL.style.setProperty('--bg-scale-y', 1);
                pupilL.style.setProperty('--bg-offset-x', '0px');
                pupilL.style.setProperty('--bg-offset-y', '0px');
                pupilR.style.setProperty('--bg-scale-x', 1);
                pupilR.style.setProperty('--bg-scale-y', 1);
                pupilR.style.setProperty('--bg-offset-x', '0px');
                pupilR.style.setProperty('--bg-offset-y', '0px');
            }

            pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
            pL.rot = 0; pR.rot = 0;
            pL.vx = undefined; pL.vy = undefined; pR.vx = undefined; pR.vy = undefined;
            head.tx = 0; head.ty = 0;
            pL.scale = 1; pR.scale = 1;
            lastSaccadeTime = time;
            modeStartTime = time;
            lastBlinkLoop = -1;
        }

        function getRandomElement(arr, excludeList = []) {
            let filtered = arr.filter(item => !excludeList.includes(item));
            if (filtered.length === 0) filtered = arr; // 如果都冷却了，就不管冷却了
            return filtered[Math.floor(Math.random() * filtered.length)];
        }

        function getLoopDur(m) {
            let dur = [105, 106, 107, 110].includes(m) ? 2000 : 4000;
            if ([101, 102, 108].includes(m)) dur = 6400; // 恢复扫视(1)和跟踪(2)的基础循环周期为 6.4 秒
            if (m === 122) dur = 6000;
            if (m >= 109 && m <= 117) {
                dur = 5000;
                if (m === 109) dur = 8000;
                if (m === 110) dur = 2500;
                if (m === 111) dur = 4500;
                if (m === 112) dur = 3000;
                if (m === 113) dur = 4000;
                if (m === 114) dur = 2500;
                if (m === 121) dur = 5000;
                if (m === 115) dur = 4000;
                if (m === 116) dur = 5000;
                if (m === 999) dur = 8000;
            }
            return dur;
        }

        function triggerNextAutoPlay() {
            if (currentMode !== 0) return;

            let nextMode;
            let nextDuration;

            if (lastPlayedTier === 1 || lastPlayedTier === 2) {
                // 强制回位原则：T1/T2 播放完必须回 T0
                nextMode = getRandomElement(TIER_0);
                lastPlayedTier = 0;
                // T0 停留时间较长 (10s - 15s)
                nextDuration = 10000 + Math.random() * 5000; 
            } else {
                // 当前是 T0，根据概率决定下一个状态 (70% T0, 20% T1, 10% T2)
                let rand = Math.random();
                if (rand < 0.7) {
                    nextMode = getRandomElement(TIER_0);
                    lastPlayedTier = 0;
                    nextDuration = 10000 + Math.random() * 5000;
                } else if (rand < 0.9) {
                    nextMode = getRandomElement(TIER_1, recentPlayed);
                    lastPlayedTier = 1;
                    // T1 播放 1 到 2 个周期
                    let cycles = Math.random() < 0.5 ? 1 : 2;
                    nextDuration = getLoopDur(nextMode) * cycles;
                } else {
                    nextMode = getRandomElement(TIER_2, recentPlayed);
                    lastPlayedTier = 2;
                    // T2 情绪彩蛋，通常只播放 1 个周期
                    nextDuration = getLoopDur(nextMode);
                }
            }

            // 更新冷却队列 (保持最近5个不重复)
            if (lastPlayedTier !== 0) {
                recentPlayed.push(nextMode);
                if (recentPlayed.length > 5) recentPlayed.shift();
            }

            internalMode = nextMode;
            applyInternalMode(internalMode);

            // 在界面上提示当前播放的内容，不改变左侧高亮
            emotionEl.innerText = `[实机运行中] 正在播放: ${modes[nextMode].t}`;
            emotionEl.style.display = 'block';
            emotionEl.style.color = '#10b981';

            // 安排下一次切换
            autoPlayTimer = setTimeout(() => {
                triggerNextAutoPlay();
            }, nextDuration);
        }

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        function lerp(start, end, amt) { return (1 - amt) * start + amt * end; }
        function getNoise(amp) { return (Math.random() + Math.random() + Math.random() - 1.5) * amp; }

        function updateLogic(dt) {
            time += dt;

            let speedL = 0.15, speedR = 0.15; 
            let noiseAmp = 0;
            let headSpeed = 0.1;
            
            // 默认无缩放
            let scaleL = 1, scaleR = 1;

            head.tx = 0; head.ty = 0;
            
            // 统一定义循环周期
            let loopDur = getLoopDur(internalMode);
            let localTime = time - modeStartTime;
            let t = localTime % loopDur;
            let currentLoopCount = Math.floor(localTime / loopDur);
            
            // 统一控制眨眼，保证首尾帧绝对没有眨眼形变
            if (currentLoopCount !== lastBlinkLoop && t > loopDur / 2) {
                // 30% 概率触发眨眼，打破机械感
                if (Math.random() < 0.3) {
                    if (internalMode === 103 || internalMode === 115) {
                        triggerBlink(800); // 困倦、眩晕钟摆模式长眨眼
                    } else if (![105, 106, 107, 108, 120, 110, 111, 114, 121, 116, 999, 122].includes(internalMode)) { 
                        triggerBlink(300); // 屏蔽一些会影响效果的模式的眨眼
                    }
                }
                // 无论这 30% 概率是否命中，都将该周期标记为已处理，防止在当前周期的后续帧重复判定
                lastBlinkLoop = currentLoopCount;
            }

            switch(internalMode) {
                case 122: // 眼泪汪汪 (Teary Eyes)
                    let centerF2 = 1;
                    let transDur2 = 600; 
                    if (t < transDur2) {
                        centerF2 = t / transDur2;
                    } else if (t > loopDur - transDur2) {
                        centerF2 = (loopDur - t) / transDur2;
                    }
                    centerF2 = centerF2 * centerF2 * (3 - 2 * centerF2); 

                    let tearF = 0;
                    let tearDelay = 600; 
                    let tearFadeDur = 300; 
                    if (t > tearDelay && t < loopDur - tearDelay) {
                        if (t < tearDelay + tearFadeDur) {
                            tearF = (t - tearDelay) / tearFadeDur;
                        } else if (t > loopDur - tearDelay - tearFadeDur) {
                            tearF = (loopDur - tearDelay - t) / tearFadeDur;
                        } else {
                            tearF = 1;
                        }
                    }
                    tearF = tearF * tearF * (3 - 2 * tearF);

                    let currentScale2 = (70 + 50 * centerF2) / 70; 
                    
                    let slideF2 = 0;
                    let slideStart2 = transDur2 + 200; 
                    let slideEnd2 = loopDur - transDur2 - 200; 
                    if (t > slideStart2 && t < slideEnd2) {
                        let slideProgress2 = (t - slideStart2) / (slideEnd2 - slideStart2);
                        slideF2 = Math.sin(slideProgress2 * Math.PI); 
                    }
                    
                    let offsetX2 = 1.5 * centerF2;
                    let offsetY2 = (3 - 8 * slideF2) * centerF2;
                    
                    pupilL.style.setProperty('--bg-scale-x', currentScale2);
                    pupilL.style.setProperty('--bg-scale-y', currentScale2);
                    pupilL.style.setProperty('--bg-offset-x', offsetX2 + 'px');
                    pupilL.style.setProperty('--bg-offset-y', offsetY2 + 'px');
                    pupilR.style.setProperty('--bg-scale-x', currentScale2);
                    pupilR.style.setProperty('--bg-scale-y', currentScale2);
                    pupilR.style.setProperty('--bg-offset-x', offsetX2 + 'px');
                    pupilR.style.setProperty('--bg-offset-y', offsetY2 + 'px');

                    let trembleXL = 0, trembleYL = 0, trembleXR = 0, trembleYR = 0;
                    if (tearF > 0.01) {
                        trembleXL = Math.sin(time / 45) * 1.2 + Math.cos(time / 65) * 0.8;
                        trembleYL = Math.cos(time / 40) * 1.2 + Math.sin(time / 60) * 0.8;
                        trembleXR = Math.sin(time / 48) * 1.2 + Math.cos(time / 68) * 0.8;
                        trembleYR = Math.cos(time / 38) * 1.2 + Math.sin(time / 62) * 0.8;
                    }

                    if (tearHlL) {
                        tearHlL.style.opacity = 1;
                        tearHlL.style.transform = `translate(calc(-50% + var(--bg-offset-x, 0px) + ${trembleXL}px), calc(-50% + var(--bg-offset-y, 0px) + ${trembleYL}px)) scale(${tearF})`;
                    }
                    if (tearHlR) {
                        tearHlR.style.opacity = 1;
                        tearHlR.style.transform = `translate(calc(-50% + var(--bg-offset-x, 0px) + ${trembleXR}px), calc(-50% + var(--bg-offset-y, 0px) + ${trembleYR}px)) scale(${tearF})`;
                    }

                    if (tearF > 0.01) {
                        let scaleX = 1 + Math.sin(time / 400) * 0.04; 
                        let scaleY = 1 + Math.cos(time / 400) * 0.04; 

                        lTearMain.style.setProperty('--tear-scale-x', scaleX);
                        lTearMain.style.setProperty('--tear-scale-y', scaleY);
                        lTearSub1.style.setProperty('--tear-scale-x', scaleX);
                        lTearSub1.style.setProperty('--tear-scale-y', scaleY);
                        lTearSub2.style.setProperty('--tear-scale-x', scaleX);
                        lTearSub2.style.setProperty('--tear-scale-y', scaleY);

                        let scaleX2 = 1 + Math.cos(time / 400) * 0.04;
                        let scaleY2 = 1 + Math.sin(time / 400) * 0.04;
                        
                        rTearMain.style.setProperty('--tear-scale-x', scaleX2);
                        rTearMain.style.setProperty('--tear-scale-y', scaleY2);
                        rTearSub1.style.setProperty('--tear-scale-x', scaleX2);
                        rTearSub1.style.setProperty('--tear-scale-y', scaleY2);
                        rTearSub2.style.setProperty('--tear-scale-x', scaleX2);
                        rTearSub2.style.setProperty('--tear-scale-y', scaleY2);
                    }

                    let dropProgress = 0;
                    if (t > tearDelay) {
                        let rawProgress = Math.min(1, (t - tearDelay) / (loopDur - tearDelay * 2));
                        dropProgress = 1 - Math.pow(1 - rawProgress, 3);
                    }
                    
                    let sub1SlideX = 12 * (1 - dropProgress);
                    let sub1SlideY = -2 * (1 - dropProgress);
                    
                    let sub2SlideX = 3 * (1 - dropProgress);
                    let sub2SlideY = -16 * (1 - dropProgress);
                    
                    lTearSub1.style.setProperty('--slide-x', sub1SlideX + 'px');
                    lTearSub1.style.setProperty('--slide-y', sub1SlideY + 'px');
                    rTearSub1.style.setProperty('--slide-x', sub1SlideX + 'px');
                    rTearSub1.style.setProperty('--slide-y', sub1SlideY + 'px');
                    
                    lTearSub2.style.setProperty('--slide-x', sub2SlideX + 'px');
                    lTearSub2.style.setProperty('--slide-y', sub2SlideY + 'px');
                    rTearSub2.style.setProperty('--slide-x', sub2SlideX + 'px');
                    rTearSub2.style.setProperty('--slide-y', sub2SlideY + 'px');

                    pL.tx = offsetX2 * 0.4; pL.ty = offsetY2 * 0.4;
                    pR.tx = -offsetX2 * 0.4; pR.ty = offsetY2 * 0.4;
                    
                    let sway2 = Math.sin(time / 600) * 3 * centerF2;
                    pL.tx += sway2; pR.tx += sway2;
                    scaleL = scaleR = 1 + Math.sin(time / 1000) * 0.03 * centerF2;
                    pL.scale = lerp(pL.scale || 1, scaleL, 0.2);
                    pR.scale = lerp(pR.scale || 1, scaleR, 0.2);
                    speedL = speedR = 0.05; 
                    noiseAmp = 0; 
                    break;

                case 101: // Saccades
                    if (t < 200) {
                        // 首帧安全区：保持居中，等待第一次扫视
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                        lastSaccadeTime = time; 
                    } else if (t > loopDur - 1500) {
                        // 结束前 1.5 秒，平滑地“看回”中心，不再触发新的随机扫视
                        // 使用极慢的跟随速度，营造一种“看累了，发呆回正”的自然感
                        pL.tx = 0; pL.ty = 0;
                        pR.tx = 0; pR.ty = 0;
                        // 覆盖掉普通的扫视速度，使用极度平滑的 lerp
                        speedL = speedR = 0.03; 
                    } else {
                        // 正常扫视逻辑 (200ms ~ loopDur-1500ms)
                        if (time - lastSaccadeTime > 800 + Math.random() * 1200) {
                        // 1. 落点分布优化：极坐标系 (圆形分布) + 大小扫视机制
                        // 降低微扫视的概率：将大扫视概率从 30% 提升到 60%
                        let isMacro = Math.random() < 0.6; // 60%概率大扫视(四处看)，40%微扫视(聚焦微调)
                        // 稍微增加微扫视的距离：从 0~10 增加到 5~15
                        let radius = isMacro ? 20 + Math.random() * 20 : 5 + Math.random() * 10;
                        let angle = Math.random() * Math.PI * 2;
                        
                        let tx = Math.cos(angle) * radius;
                        let ty = Math.sin(angle) * radius;

                        // 主视眼(左眼)精准落点
                        pL.tx = tx; 
                        pL.ty = ty; 
                        
                        // 2. 微小的双眼差异：非主视眼(右眼)产生微小的物理误差 (±2像素)
                        pR.tx = tx + (Math.random() - 0.5) * 4; 
                        pR.ty = ty + (Math.random() - 0.5) * 4;
                        
                        // 3. 主流线速度曲线 (Main Sequence of Saccades)
                        // 降低插值速度系数，消除瞬移感。让人眼能看清移动的过程。
                        // 将速度映射到 0.15 到 0.30 之间 (更慢)，保证了扫视的干脆，又有了丝滑的线性过渡。
                        let distanceFactor = Math.sqrt(radius / 40); // 0.35 到 1.0 之间
                        let baseSpeed = 0.15 + distanceFactor * 0.15; 
                        
                        // 加入极小的神经随机波动
                        baseSpeed += (Math.random() - 0.5) * 0.02;
                        
                        // 限制最高和最低速度，防止过慢或过快
                        baseSpeed = Math.max(0.12, Math.min(0.35, baseSpeed));

                        pL.saccadeSpeed = baseSpeed;
                        pR.saccadeSpeed = baseSpeed - 0.015; // 右眼稍微慢一点点
                        
                        lastSaccadeTime = time;
                    }
                    speedL = pL.saccadeSpeed || 0.3; 
                    speedR = pR.saccadeSpeed || 0.3; 
                    }
                    break;
                    
                case 102: // Smooth Pursuit
                    if (t < 200) {
                        // 首帧安全区：目标在中心
                        pursuit.tx = 0; pursuit.ty = 0;
                        pursuit.speed = 0.1; 
                    } else if (t > loopDur - 1500) {
                        // 结束前 1.5 秒，将追踪目标缓慢引回中心
                        pursuit.tx = 0; pursuit.ty = 0;
                        // 使用极慢的速度 (0.01) 让目标像溜冰一样滑回中心，消除顿挫感
                        pursuit.speed = 0.01; 
                    } else {
                        // 随机生成新的目标点 (200ms ~ loopDur-1500ms)
                        if (time > pursuit.nextTime) {
                            // 使用极坐标生成目标，保证最低位移幅度 (半径至少20)，避免在中心小幅度徘徊
                            let angle = Math.random() * Math.PI * 2;
                            let radius = 20 + Math.random() * 20; 
                            pursuit.tx = Math.cos(angle) * radius;
                            pursuit.ty = Math.sin(angle) * radius;
                            
                            pursuit.nextTime = time + 600 + Math.random() * 1500; // 稍微加快目标改变的频率
                            // 每次生成新目标时，赋予一个随机的移动速度，让速度变化更显著
                            pursuit.speed = 0.01 + Math.random() * 0.04; // 速度在极慢(0.01)到较快(0.05)之间随机
                        }
                    }
                    // 虚拟目标进行平滑的插值游走
                    pursuit.x = lerp(pursuit.x, pursuit.tx, pursuit.speed || 0.015);
                    pursuit.y = lerp(pursuit.y, pursuit.ty, pursuit.speed || 0.015);
                    
                    // 左右眼追踪虚拟目标
                    pL.tx = pursuit.x;
                    pL.ty = pursuit.y;
                    pR.tx = pursuit.x; 
                    pR.ty = pursuit.y;
                    // 提高眼球自身的物理跟随响应速度，让追视更敏捷
                    speedL = speedR = 0.15; 
                    break;

                case 103: // Sleepy Drift
                    let env8 = 1;
                    if (t < 300) env8 = 0;
                    else if (t < 800) env8 = (t - 300) / 500;
                    else if (t > 3700) env8 = 0;
                    else if (t > 3200) env8 = (3700 - t) / 500;

                    // 向下沉降的过程中，加入不规则的左右漂移，营造散落感
                    pL.tx = (-5 + Math.sin(time/800)*12 + Math.cos(time/500)*6) * env8; 
                    pL.ty = (35 + Math.sin(time/1200)*8) * env8;
                    pR.tx = (5 + Math.sin(time/700)*12 + Math.cos(time/600)*6) * env8; 
                    pR.ty = (35 + Math.sin(time/1300)*8) * env8;
                    speedL = speedR = 0.05; 
                    break;


                case 105: // Flutter / Opsoclonus
                    if (t < 200) {
                        // 首帧安全区：强制居中，无缩放
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        noiseAmp = 1.0; speedL = speedR = 0.2; scaleL = scaleR = 1;
                    } else if (t < 1200) {
                        // 涣散期间：在1秒内快速向两边斜上方漂移分离
                        let progress = (t - 200) / 1000; // 0 到 1 的进度
                        pL.tx = -25 * progress; // 左眼向左上方飘
                        pL.ty = -20 * progress;
                        pR.tx = 25 * progress; // 右眼向右上方飘
                        pR.ty = -20 * progress;
                        speedL = speedR = 0.05; // 稍微加快漂移速度
                        noiseAmp = 0; // 取消微颤，呈现彻底死寂的散焦感
                        scaleL = scaleR = 1 + (0.15 * progress); // 瞳孔随着时间微微放大
                    } else if (t < 1500) {
                        // 抽搐期间：极高频剧烈抖动，瞳孔猛然收缩（惊吓/清醒）
                        pL.tx = Math.sin(time/15) * 20;
                        pL.ty = Math.cos(time/12) * 15;
                        pR.tx = Math.sin(time/15) * 20;
                        pR.ty = Math.cos(time/12) * 15;
                        speedL = speedR = 0.9;
                        scaleL = scaleR = 0.7; // 瞳孔急剧缩小
                    } else {
                        // 尾部安全区：强制居中，无缩放
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        noiseAmp = 1.0; // 正常的微颤
                        speedL = speedR = 0.2;
                        scaleL = scaleR = 1;
                    }
                    
                    // 将缩放状态存入对象中供后面更新DOM使用
                    pL.scale = lerp(pL.scale || 1, scaleL, 0.1);
                    pR.scale = lerp(pR.scale || 1, scaleR, 0.1);
                    break;

                case 106: // Guilty
                    // 2000ms loop
                    if (t < 200 || t > 1800) {
                        // 首尾帧安全区：强制居中对齐
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                    } else {
                        // 迅速在右下角和左下角之间来回切换
                        let guiltyTime = t - 200; // 0 to 1600
                        let interval = 800; // 降低切换频率，从400ms改为800ms
                        let step = Math.floor(guiltyTime / interval);
                        let side = (step % 2 === 0) ? 1 : -1; // 1为右，-1为左
                        
                        pL.tx = side * 25; pL.ty = 25;
                        pR.tx = side * 25; pR.ty = 25;
                        speedL = speedR = 0.15; // 降低物理跟随速度，让左右切换看起来更平滑自然一些
                    }
                    break;

                case 107: // Terrified / Cornered
                    // 2000ms loop
                    if (t < 200 || t > 1800) {
                        // 首尾帧安全区
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        scaleL = scaleR = 1;
                        noiseAmp = 0;
                        speedL = speedR = 0.2;
                    } else {
                        // 躲在右下角，紧紧靠在一起
                        pL.tx = 25; pL.ty = 25;
                        pR.tx = 35; pR.ty = 35; 
                        
                        scaleL = scaleR = 0.85; // 瞳孔再大一点点 (从0.7提升到0.85)
                        noiseAmp = 2.5; // 更明显的剧烈颤抖
                        speedL = speedR = 0.8; // 提高速度以响应更高频的噪音
                    }
                    pL.scale = lerp(pL.scale || 1, scaleL, 0.1);
                    pR.scale = lerp(pR.scale || 1, scaleR, 0.1);
                    break;

                case 108: // Typewriter
                    if (t < 200 || t >= 6200) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                    } else {
                        let readTime = t - 200; // 0 to 6000
                        if (readTime > 5999) readTime = 5999; // 严格防止溢出导致的左下角抖动
                        let lineTime = 2000; // 每一行的时间 (一共3行)
                        let lineIndex = Math.floor(readTime / lineTime); // 0, 1, 2
                        let lineT = readTime % lineTime; // 0 to 1999
                        
                        // Y坐标根据行数变化：第一行-15，第二行0，第三行15
                        let yPos = -15 + lineIndex * 15;
                        
                        if (lineT < 1600) { 
                            // 阶梯状向右阅读 (顿顿顿顿)
                            let steps = 6;
                            let currentStep = Math.floor((lineT / 1600) * steps);
                            let xPos = -25 + (currentStep / (steps - 1)) * 50; // -25 到 25
                            pL.tx = xPos; pL.ty = yPos;
                            pR.tx = xPos; pR.ty = yPos;
                            speedL = speedR = 0.6; // 短促的快速跳跃
                        } else { 
                            // 回车键 (Carriage Return)
                            if (lineIndex < 2) {
                                // 前两行，极其平滑地滑回左侧下一行
                                pL.tx = -25; pL.ty = yPos + 15; 
                                pR.tx = -25; pR.ty = yPos + 15;
                                speedL = speedR = 0.05; // 更加平滑缓慢的滑动回车
                            } else {
                                // 最后一行读完，直接平滑归位到中心
                                pL.tx = 0; pL.ty = 0; 
                                pR.tx = 0; pR.ty = 0;
                                speedL = speedR = 0.05; 
                            }
                        }
                    }
                    break;

                case 120: // Ping-Pong
                    if (t < 200 || t > 3800) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                    } else {
                        let matchTime = t - 200; // 0 to 3600
                        let side = 1;
                        
                        // 频率随着时间越来越快
                        let interval;
                        if (matchTime < 1000) interval = 500;
                        else if (matchTime < 2000) interval = 250;
                        else if (matchTime < 2800) interval = 125;
                        else interval = 60; // 最终疯狂状态
                        
                        let step = Math.floor(matchTime / interval);
                        side = (step % 2 === 0) ? 1 : -1;
                        
                        if (matchTime > 2800) {
                            // 最终崩溃，胡乱转动
                            pL.tx = Math.random() * 20 - 10; pL.ty = Math.random() * 20 - 10;
                            pR.tx = Math.random() * 20 - 10; pR.ty = Math.random() * 20 - 10;
                            speedL = speedR = 0.8;
                        } else {
                            // 左右来回看
                            pL.tx = side * 30; pL.ty = 0;
                            pR.tx = side * 30; pR.ty = 0;
                            speedL = speedR = 0.5;
                        }
                    }
                    break;

                case 109: // Shifty / Sneaky Eyes (鬼鬼祟祟)
                    if (t < 200 || t > 7800) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                    } else {
                        let sneakTime = t - 200;
                        // 极慢的水平极限滑动
                        let cycle = sneakTime / 7600; // 0 to 1
                        
                        // 使用平滑阶跃函数(Smoothstep)制造在极限边缘的黏滞停顿感
                        let smoothT = cycle < 0.5 
                            ? (Math.sin((cycle * 2 - 0.5) * Math.PI) + 1) / 2 // 0->1
                            : (Math.sin(((cycle - 0.5) * 2 + 0.5) * Math.PI) + 1) / 2; // 1->0
                        
                        let xPos = lerp(-35, 35, smoothT); // 左右极限拉扯
                        
                        pL.tx = xPos; pL.ty = 20; // 压低视线 (ty=20)
                        pR.tx = xPos; pR.ty = 20;
                        
                        // 稍微提高物理跟随速度(从 0.03 提至 0.05)，确保它在时间结束前能真实滑到边缘
                        speedL = speedR = 0.05; 
                    }
                    break;

                case 118: // Derpy Eyes (纯粹睿智 - 无缩放版)
                    if (t < 200 || t > 4800) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                    } else {
                        // 完全打破双眼同步，使用正弦波叠加制造无规律的缓慢游走
                        pL.tx = Math.sin(time / 400) * 20 + Math.cos(time / 700) * 15;
                        pL.ty = Math.cos(time / 500) * 20 + Math.sin(time / 600) * 15;
                        
                        pR.tx = Math.sin(time / 550) * 20 + Math.cos(time / 450) * 15;
                        pR.ty = Math.cos(time / 650) * 20 + Math.sin(time / 350) * 15;
                        
                        speedL = speedR = 0.04;
                    }
                    break;

                case 110: // Panicked Searching (左顾右盼找救兵)
                    if (t < 100 || t > 2400) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                    } else {
                        // 底部两端高频硬切
                        let phase = (t - 100) / 2300;
                        let switchCount = Math.floor(phase * 8); // 8次来回
                        if (switchCount % 2 === 0) {
                            pL.tx = -35; pL.ty = 25;
                            pR.tx = -35; pR.ty = 25;
                        } else {
                            pL.tx = 35; pL.ty = 25;
                            pR.tx = 35; pR.ty = 25;
                        }
                        speedL = speedR = 0.4; // 非常急促的视线转移
                    }
                    break;

                case 111: // Cylon Scanner (扫描仪)
                    if (t < 4000) {
                        // 正常的丝滑扫描阶段，4000ms 刚好完成两次完整来回
                        let scanPhase = t / 2000; 
                        let targetX = Math.sin(scanPhase * Math.PI * 2) * 35;
                        pL.tx = targetX; pL.ty = 0;
                        pR.tx = targetX; pR.ty = 0;
                        
                        // 刚切入模式的前 200ms 用较慢的速度平滑过渡，之后用 1 完全跟随公式
                        speedL = speedR = t < 200 ? 0.2 : 1; 
                    } else {
                        // 扫描结束，利用 sin(4PI)=0 的特性，此时已经在中心，保持静止休息
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                    }
                    break;

                case 112: // Cross-eyed Focus (看鼻尖/斗鸡眼)
                    if (t < 200 || t > 2800) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                    } else {
                        // 往内侧下方看
                        pL.tx = 25; pL.ty = 20;
                        pR.tx = -25; pR.ty = 20;
                        
                        // 偶尔肌肉酸痛抽动一下
                        if (Math.random() < 0.05) {
                            pL.ty = 25; pR.ty = 25;
                        }
                        speedL = speedR = 0.15;
                    }
                    break;

                case 113: // Elevator Look (不屑打量)
                    if (t < 200 || t > 3800) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                    } else if (t < 2500) {
                        // 压低视线，从下往上极其缓慢地扫视
                        let scanPhase = (t - 200) / 2300; // 0 to 1
                        pL.ty = 25 - scanPhase * 40; 
                        pR.ty = 25 - scanPhase * 40;
                        // 微微带一点弧度
                        pL.tx = Math.sin(scanPhase * Math.PI) * 10;
                        pR.tx = Math.sin(scanPhase * Math.PI) * 10;
                        speedL = speedR = 0.05; // 极其傲慢的慢速
                    } else {
                        // 扫视完后，翻个极小的白眼并快速回中
                        pL.tx = -10; pL.ty = -20;
                        pR.tx = -10; pR.ty = -20;
                        speedL = speedR = 0.3;
                    }
                    break;

                case 114: // Eyebrow Dance (挑衅抖眉)
                    if (t < 200 || t > 2500) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                    } else {
                        let dancePhase = t - 200;
                        
                        function getEyebrowPos(localT) {
                            if (localT < 0 || localT > 400) return {tx: 0, ty: 0};
                            if (localT < 150) {
                                // 向上移动，带有不规则的 X 轴偏移
                                let progress = localT / 150;
                                let easeOut = Math.sin(progress * Math.PI / 2);
                                return {
                                    tx: Math.sin(progress * Math.PI) * 6, // 略微不规则轨迹
                                    ty: -30 * easeOut
                                };
                            } else if (localT < 300) {
                                // 悬停
                                return {
                                    tx: 0, 
                                    ty: -30
                                };
                            } else {
                                // 下落
                                let progress = (localT - 300) / 100;
                                return {
                                    tx: 0,
                                    ty: -30 * (1 - progress)
                                };
                            }
                        }

                        // 左边抖两下 (时间间隔缩短一点，让两次连贯)
                        let posL1 = getEyebrowPos(dancePhase - 100); 
                        let posL2 = getEyebrowPos(dancePhase - 600);
                        
                        // 右边抖一下
                        let posR  = getEyebrowPos(dancePhase - 1100); 
                        
                        pL.tx = posL1.tx + posL2.tx;
                        pL.ty = posL1.ty + posL2.ty;
                        pR.tx = posR.tx;
                        pR.ty = posR.ty;
                        
                        speedL = speedR = 0.8; // 提高跟随速度，展示出晃动细节
                    }
                    break;

                case 121: // The Buzzing Fly (苍蝇环绕)
                    if (t < 200 || t > 4800) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                    } else {
                        // 斗鸡眼追踪不规则轨迹
                        let flyX = Math.sin(time / 200) * 30 + Math.cos(time / 350) * 15;
                        let flyY = Math.cos(time / 180) * 30 + Math.sin(time / 250) * 15;
                        
                        pL.tx = flyX + 15; // 左眼尽力往右看苍蝇
                        pL.ty = flyY;
                        pR.tx = flyX - 15; // 右眼尽力往左看苍蝇
                        pR.ty = flyY;
                        
                        speedL = speedR = 0.3; // 追踪速度比较快，显得很急躁
                    }
                    break;

                case 115: // Clockwork Dizzy (眩晕钟摆)
                    if (t < 200 || t > 3800) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                    } else {
                        // 底部半圆摇摆，加大摇晃幅度到35
                        let swing = Math.sin(time / 400); // -1 to 1
                        
                        pL.tx = swing * 35; 
                        pR.tx = swing * 35;
                        
                        // 用 cos 制造一个向下的弧度，形成像钟摆一样的半圆
                        let drop = Math.cos(time / 400) * 15; // 增加下垂幅度
                        pL.ty = 20 - drop; 
                        pR.ty = 20 - drop;
                        
                        speedL = speedR = 0.1; // 非常沉重迟缓的物理反馈
                    }
                    break;

                case 116: // Sneaky Periscope (暗中观察)
                    if (t < 200 || t > 4800) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                    } else {
                        // 强制在最顶部
                        pL.ty = -35; pR.ty = -35;
                        
                        // 分段式机械扫视
                        let stepPhase = Math.floor((t - 200) / 800) % 4; // 0, 1, 2, 3
                        if (stepPhase === 0) {
                            pL.tx = -25; pR.tx = -25; // 看左
                        } else if (stepPhase === 1) {
                            pL.tx = 0; pR.tx = 0; // 看中
                        } else if (stepPhase === 2) {
                            pL.tx = 25; pR.tx = 25; // 看右
                        } else {
                            pL.tx = 0; pR.tx = 0; // 看中
                        }
                        
                        speedL = speedR = 0.4; // 机械式的干脆移动
                    }
                    break;

                case 117: // Soul Leaving (虚脱抽离)
                    if (t < 200 || t > 5800) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                    } else if (t < 2500) {
                        // 极慢曲线向上飘 (灵魂出窍)
                        let risePhase = (t - 200) / 2300; // 0 to 1
                        
                        // Y轴：使用 easeOutSine 让上升越来越慢，到顶端自然悬停 (速度降为0)
                        let easeOut = Math.sin(risePhase * Math.PI / 2); 
                        // X轴：加入 S 型曲线摇摆 (左右飘动)，并在结束时刚好回到 0
                        let swayX = Math.sin(risePhase * Math.PI * 2) * 15; 
                        
                        pL.tx = swayX; pL.ty = -35 * easeOut;
                        pR.tx = swayX; pR.ty = -35 * easeOut;
                        
                        speedL = speedR = 0.5; // 提高跟随速度，完美贴合数学曲线
                    } else if (t < 2700) {
                        // 自由落体坠落 (重力加速自然衔接)
                        let dropPhase = (t - 2500) / 200; // 0 to 1
                        let gravityY = -35 + 70 * Math.pow(dropPhase, 2.5); // 加速下坠曲线
                        
                        pL.tx = 0; pL.ty = gravityY;
                        pR.tx = 0; pR.ty = gravityY;
                        speedL = speedR = 0.8; // 极快砸下
                    } else if (t < 4500) {
                        // 砸到地板后产生不规则、自然的反弹 (利用绝对值sin+衰减模拟物理弹跳)
                        let bTime = t - 2700;
                        let bounceY = Math.abs(Math.sin(bTime / 120)) * Math.exp(-bTime / 500) * 50; 
                        
                        // X轴加入不规则的偏移，模拟重心不稳左右乱弹
                        let bounceX = Math.sin(bTime / 90) * bounceY * 0.4;
                        
                        pL.tx = bounceX; pL.ty = 35 - bounceY;
                        pR.tx = bounceX; pR.ty = 35 - bounceY;
                        speedL = speedR = 0.8; // 保持较高的响应速度来体现弹跳
                    } else {
                        // 瘫软完毕，极其疲惫地缓慢归位
                        pL.tx = 0; pL.ty = 0;
                        pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.03; // 慢速爬起来
                    }
                    break;
            }

            // Head update
            head.x = lerp(head.x, head.tx, headSpeed);
            head.y = lerp(head.y, head.ty, headSpeed);
            headContainer.style.transform = `translate(${head.x}px, ${head.y}px)`;

            // Pupils update
            pL.x = lerp(pL.x, pL.tx + getNoise(noiseAmp), speedL);
            pL.y = lerp(pL.y, pL.ty + getNoise(noiseAmp), speedL);
            pR.x = lerp(pR.x, pR.tx + getNoise(noiseAmp), speedR);
            pR.y = lerp(pR.y, pR.ty + getNoise(noiseAmp), speedR);

            // Circular constraint
            function constrain(p) {
                let limit = (internalMode === 32 || internalMode === 122) ? 15 : 33;
                let dist = Math.sqrt(p.x*p.x + p.y*p.y);
                if (dist > limit) {
                    p.x = (p.x / dist) * limit;
                    p.y = (p.y / dist) * limit;
                }
            }
            constrain(pL); constrain(pR);

            pupilL.style.transform = `translate(${pL.x}px, ${pL.y}px) scale(${pL.scale || 1}) rotate(${pL.rot || 0}deg)`;
            pupilR.style.transform = `translate(${pR.x}px, ${pR.y}px) scale(${pR.scale || 1}) rotate(${pR.rot || 0}deg)`;

            // 联动眼白位移 (视差效果)
            let parallaxRatio = 0.22;
            let scleraX_L = pL.x * parallaxRatio;
            let scleraY_L = pL.y * parallaxRatio;
            let scleraX_R = pR.x * parallaxRatio;
            let scleraY_R = pR.y * parallaxRatio;
            
            pupilL.closest('.eye').style.setProperty('--sclera-x', `${scleraX_L}px`);
            pupilL.closest('.eye').style.setProperty('--sclera-y', `${scleraY_L}px`);
            pupilR.closest('.eye').style.setProperty('--sclera-x', `${scleraX_R}px`);
            pupilR.closest('.eye').style.setProperty('--sclera-y', `${scleraY_R}px`);
            
            pupilL.parentElement.style.setProperty('--sclera-x', `${scleraX_L}px`);
            pupilL.parentElement.style.setProperty('--sclera-y', `${scleraY_L}px`);
            pupilR.parentElement.style.setProperty('--sclera-x', `${scleraX_R}px`);
            pupilR.parentElement.style.setProperty('--sclera-y', `${scleraY_R}px`);
        }

        let lastTime = performance.now();
        function loop(now) {
            let dt = now - lastTime;
            lastTime = now;
            updateLogic(dt);
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);

        function triggerBlink(duration) {
            document.querySelectorAll('.eye').forEach(eye => {
                eye.style.setProperty('--blink-dur', (duration/1000) + 's');
                eye.classList.remove('is-blinking');
                void eye.offsetWidth; 
                eye.classList.add('is-blinking');
            });
        }
    </script>
</body>
