<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desk419 Googly Eyes</title>
    <style>
        /* Base styles */
        body { margin: 0; height: 100vh; background-color: #050505; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; color: white; }
        .tabs { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; background: rgba(255, 255, 255, 0.1); padding: 15px 20px; border-radius: 20px; backdrop-filter: blur(10px); z-index: 100; width: 90%; max-width: 900px; }
        .tab { background: transparent; border: 1px solid rgba(255, 255, 255, 0.3); color: white; padding: 8px 14px; border-radius: 20px; cursor: pointer; transition: all 0.3s; font-weight: 500; outline: none; font-size: 13px; }
        .tab.active, .tab:hover { background: white; color: black; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        
        .scene { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        
        .eye-container { display: flex; gap: 60px; position: relative; }

        /* 1. 物理 TFT 屏幕 (硬件边框约束) */
        .eye { 
            width: 160px; height: 160px; 
            background-color: #080808; 
            border-radius: 50%; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 0 0 2px #222, inset 0 0 12px #000; 
        }
        
        /* 瞬目反射 (眼睑) */
        .eyelid-top, .eyelid-bottom {
            position: absolute;
            left: 0;
            width: 100%;
            background-color: #080808; 
            z-index: 10; 
        }
        .eyelid-top {
            top: 0;
            height: 85%;
            border-bottom-left-radius: 50% 8%;
            border-bottom-right-radius: 50% 8%;
            transform: translateY(-100%);
        }
        .eyelid-bottom {
            bottom: 0;
            height: 25%;
            border-top-left-radius: 50% 10%;
            border-top-right-radius: 50% 10%;
            transform: translateY(100%);
        }

        .eye.is-blinking .eyelid-top { animation: blink-top var(--blink-dur, 0.3s) forwards; }
        .eye.is-blinking .eyelid-bottom { animation: blink-bottom var(--blink-dur, 0.3s) forwards; }

        /* 左眼和右眼添加微小的神经延迟 */
        .eye:nth-child(2).is-blinking .eyelid-top, 
        .eye:nth-child(2).is-blinking .eyelid-bottom {
            animation-delay: 0.04s;
        }

        @keyframes blink-top {
            0% { transform: translateY(-100%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); } 
            35%, 40% { transform: translateY(0%); animation-timing-function: cubic-bezier(0.1, 0.8, 0.3, 1); } 
            100% { transform: translateY(-100%); }
        }
        @keyframes blink-bottom {
            0% { transform: translateY(100%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
            35%, 40% { transform: translateY(0%); animation-timing-function: cubic-bezier(0.1, 0.8, 0.3, 1); }
            100% { transform: translateY(100%); }
        }

        /* 真实的眼白图层 */
        .eye::before {
            content: '';
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            background-color: #f4f4f4;
            border-radius: 50%;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
            z-index: 0;
            /* 引入 CSS 变量控制眼白位移，实现 3D 球体旋转的视差效果 */
            transform: translate(var(--sclera-x, 0px), var(--sclera-y, 0px));
        }

        /* 眼珠/瞳孔 (经典的 Googly eyes 风格) */
        .pupil {
            width: 70px; height: 70px;
            background-color: #000;
            border-radius: 50%;
            position: absolute; top: 50%; left: 50%;
            margin-left: -35px; margin-top: -35px;
            z-index: 2;
        }

        /* 模式说明浮层 */
        .desc-overlay {
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
            text-align: center; max-width: 800px; width: 90%;
            background: rgba(0,0,0,0.4); padding: 20px 30px; border-radius: 15px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none; z-index: 50;
        }
        .desc-title { font-size: 22px; font-weight: bold; margin-bottom: 12px; color: #fff; letter-spacing: 1px; }
        .desc-text { font-size: 15px; color: #ddd; line-height: 1.6; }
        .desc-emotion { font-size: 14px; color: #4CAF50; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="desc-overlay">
        <div class="desc-title" id="mode-title">1. 扫视机制 (Saccades)</div>
        <div class="desc-text" id="mode-desc">瞬间的位移爆发，速度极快（弹道式），没有中间缓冲，干脆利落。</div>
        <div class="desc-emotion" id="mode-emotion">情绪外显：机警、神经质、突然发现新大陆、鬼鬼祟祟。</div>
    </div>

    <div class="scene">
        <div class="eye-container" id="head-container">
            <div class="eye">
                <div class="eyelid-top"></div><div class="eyelid-bottom"></div>
                <div class="pupil" id="pupil-l"></div>
            </div>
            <div class="eye">
                <div class="eyelid-top"></div><div class="eyelid-bottom"></div>
                <div class="pupil" id="pupil-r"></div>
            </div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="setMode(1, event)">1. 扫视 (Saccades)</button>
        <button class="tab" onclick="setMode(3, event)">2. 平稳跟踪 (Pursuit)</button>
        <button class="tab" onclick="setMode(8, event)">3. 困倦漂移 (Sleepy)</button>
        <button class="tab" onclick="setMode(10, event)">4. 滑稽对眼 (Derp)</button>
        <button class="tab" onclick="setMode(13, event)">5. 疲劳抽搐 (Flutter)</button>
        <button class="tab" onclick="setMode(15, event)">6. 心虚 (Guilty)</button>
        <button class="tab" onclick="setMode(17, event)">7. 弱小无助 (Terrified)</button>
        <button class="tab" onclick="setMode(18, event)">8. 二次确认 (Double Take)</button>
        <button class="tab" onclick="setMode(19, event)">9. 果冻弹跳 (Toon Bounce)</button>
        <button class="tab" onclick="setMode(20, event)">10. 坠入爱河 (Love Struck)</button>
        <button class="tab" onclick="setMode(21, event)">11. 卡通眩晕 (Bonked)</button>
        <button class="tab" onclick="setMode(22, event)">12. 蓄力冲刺 (Zip)</button>
        <button class="tab" onclick="setMode(24, event)">13. 速读 (Typewriter)</button>
        <button class="tab" onclick="setMode(26, event)">14. 乒乓赛 (Ping-Pong)</button>
    </div>

    <script>
        const modes = {
            1: { 
                t: "1. 扫视机制 (Saccades)", 
                d: "瞬间的位移爆发，速度极快（弹道式），没有中间缓冲，干脆利落。", 
                e: "情绪外显：机警、神经质、突然发现新大陆、鬼鬼祟祟。" 
            },
            3: { 
                t: "2. 平稳跟踪机制 (Smooth Pursuit)", 
                d: "优雅的视线咬合。眼球平滑追踪一个随机游走的虚拟目标，模拟真实的追视行为。", 
                e: "情绪外显：被催眠、极度专注、好奇。" 
            },
            8: { 
                t: "3. 困倦漂移 (Sleepy Drift)", 
                d: "肌肉控制力下降，眼球缓慢向下沉降，伴随沉重缓慢的眨眼。", 
                e: "情绪外显：极度疲惫、昏昏欲睡。" 
            },
            10: { 
                t: "4. 智能硬件对焦/迷茫 (Playful Tech)", 
                d: "斗鸡眼与失序追踪结合，两只眼睛完全不同步或极致向内聚拢。", 
                e: "情绪外显：机器陷入“迷茫/人工智障”状态，Playful Tech 滑稽感拉满。" 
            },
            13: {
                t: "5. 疲劳性震颤 (Flutter / Opsoclonus)",
                d: "眼神逐渐涣散发呆，随后突然发生短促的原地高频剧烈晃动，犹如被电击后瞬间清醒。",
                e: "情绪外显：系统Bug/突然被电了一下，极客用户最爱的电子机械冷幽默。"
            },
            15: {
                t: "6. 心虚 (Guilty)",
                d: "眼珠迅速下沉，并在底部快速左右滑动一次，随后迅速归位。",
                e: "情绪外显：心虚、掩饰错误、说谎被抓包、“不是我写的Bug”。"
            },
            17: {
                t: "7. 恐惧 / 弱小无助 (Terrified)",
                d: "两只眼珠紧紧缩在一起，躲在眼眶的最角落，瞳孔缩小，伴随持续的高频剧烈微颤。",
                e: "情绪外显：害怕、服务器快崩了、被强行断电前的恐惧。"
            },
            18: {
                t: "8. 二次确认 (Double Take)",
                d: "看一眼 -> 平淡收回 -> 零帧起手暴力砸回原位并放大回弹，经典的Slapstick喜剧效果。",
                e: "情绪外显：震惊、难以置信、看错了吧、经典卡通惊吓。"
            },
            19: {
                t: "9. 果冻弹跳 (Toon Bounce)",
                d: "眼珠在游走时引入弹簧物理，到达目标后冲过头并像果冻一样来回抖动衰减。",
                e: "情绪外显：极其调皮、Q弹、高飞式的傻乎乎活力。"
            },
            20: {
                t: "10. 坠入爱河 (Love Struck)",
                d: "瞳孔极其缓慢放大到极致，像没有重力一样伴随波浪线向斜上方缓慢漂浮。",
                e: "情绪外显：迷恋、花痴、看到美食/满分代码、灵魂出窍。"
            },
            21: {
                t: "11. 卡通眩晕 (Bonked)",
                d: "两只眼珠在眼眶里画圈，相位错开，瞳孔大小不规则缩放，打破双眼同步。",
                e: "情绪外显：被锤子敲了头、转晕了、CPU烧了。"
            },
            22: {
                t: "12. 蓄力冲刺 (Zip)",
                d: "向左上方蓄力并伴随剧烈抖动，随后瞬间瞬移到右下方目标位置。",
                e: "情绪外显：极度机警、准备逃跑、卡通人物开跑前的原地空转。"
            },
            24: {
                t: "13. 打字机式速读 (Typewriter)",
                d: "眼珠分多行向右一格一格跳跃，每读完一行迅速平滑地滑回左侧下一行。",
                e: "情绪外显：一目十行、疯狂复习期末考试、假装阅读用户协议。"
            },
            26: {
                t: "14. 激烈乒乓球赛 (Ping-Pong)",
                d: "眼珠在极左和极右之间来回切换，节奏越来越快，最后快到崩溃乱转。",
                e: "情绪外显：看两人激烈吵架、左右为难、信息过载。"
            }
        };

        // State variables
        let currentMode = 1;
        let time = 0;
        let mouseX = 0, mouseY = 0;
        
        // Physical states
        let pL = { x: 0, y: 0, tx: 0, ty: 0 };
        let pR = { x: 0, y: 0, tx: 0, ty: 0 };
        let head = { x: 0, y: 0, tx: 0, ty: 0 };
        let lastSaccadeTime = 0;
        let flutterEndTime = 0;
        let pursuit = { x: 0, y: 0, tx: 0, ty: 0, nextTime: 0 };
        let modeStartTime = 0;
        let lastBlinkLoop = -1;

        const titleEl = document.getElementById('mode-title');
        const descEl = document.getElementById('mode-desc');
        const emotionEl = document.getElementById('mode-emotion');
        const pupilL = document.getElementById('pupil-l');
        const pupilR = document.getElementById('pupil-r');
        const headContainer = document.getElementById('head-container');

        function setMode(m, e) {
            currentMode = m;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if(e) e.currentTarget.classList.add('active');
            
            titleEl.innerText = modes[m].t;
            descEl.innerText = modes[m].d;
            emotionEl.innerText = modes[m].e;
            
            pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
            head.tx = 0; head.ty = 0;
            pL.scale = 1; pR.scale = 1;
            lastSaccadeTime = time;
            modeStartTime = time;
            lastBlinkLoop = -1;
        }

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        function lerp(start, end, amt) { return (1 - amt) * start + amt * end; }
        function getNoise(amp) { return (Math.random() + Math.random() + Math.random() - 1.5) * amp; }

        function updateLogic(dt) {
            time += dt;

            let speedL = 0.15, speedR = 0.15; 
            let noiseAmp = 0;
            let headSpeed = 0.1;
            
            // 默认无缩放
            let scaleL = 1, scaleR = 1;

            head.tx = 0; head.ty = 0;
            
            // 统一定义循环周期
            let loopDur = (currentMode === 13 || currentMode === 15 || currentMode === 17) ? 2000 : 4000;
            if (currentMode === 1 || currentMode === 3 || currentMode === 24) loopDur = 6400; // 6000ms active + 400ms padding
            if (currentMode >= 18 && currentMode <= 22) loopDur = 4000; // Disney modes
            if (currentMode === 26) loopDur = 4000; // Ping-Pong
            let localTime = time - modeStartTime;
            let t = localTime % loopDur;
            let currentLoopCount = Math.floor(localTime / loopDur);
            
            // 统一控制眨眼，保证首尾帧绝对没有眨眼形变
            if (currentLoopCount !== lastBlinkLoop && t > loopDur / 2) {
                if (currentMode === 8) {
                    triggerBlink(800); // 困倦模式长眨眼
                } else if (![10, 13, 15, 17, 18, 20, 21, 22, 24, 26].includes(currentMode)) { 
                    triggerBlink(300); // 屏蔽一些会影响效果的模式的眨眼
                }
                lastBlinkLoop = currentLoopCount;
            }

            switch(currentMode) {
                case 1: // Saccades
                    if (t < 200 || t > 6200) {
                        // 首尾安全区：强制居中对齐
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                        lastSaccadeTime = time; // 暂停随机扫视
                    } else {
                        // 增加两次扫视的间隔时间：从 400~1000ms 增加到 800~2000ms
                        if (time - lastSaccadeTime > 800 + Math.random() * 1200) {
                        // 1. 落点分布优化：极坐标系 (圆形分布) + 大小扫视机制
                        // 降低微扫视的概率：将大扫视概率从 30% 提升到 60%
                        let isMacro = Math.random() < 0.6; // 60%概率大扫视(四处看)，40%微扫视(聚焦微调)
                        // 稍微增加微扫视的距离：从 0~10 增加到 5~15
                        let radius = isMacro ? 20 + Math.random() * 20 : 5 + Math.random() * 10;
                        let angle = Math.random() * Math.PI * 2;
                        
                        let tx = Math.cos(angle) * radius;
                        let ty = Math.sin(angle) * radius;

                        // 主视眼(左眼)精准落点
                        pL.tx = tx; 
                        pL.ty = ty; 
                        
                        // 2. 微小的双眼差异：非主视眼(右眼)产生微小的物理误差 (±2像素)
                        pR.tx = tx + (Math.random() - 0.5) * 4; 
                        pR.ty = ty + (Math.random() - 0.5) * 4;
                        
                        // 3. 主流线速度曲线 (Main Sequence of Saccades)
                        // 降低插值速度系数，消除瞬移感。让人眼能看清移动的过程。
                        // 将速度映射到 0.15 到 0.30 之间 (更慢)，保证了扫视的干脆，又有了丝滑的线性过渡。
                        let distanceFactor = Math.sqrt(radius / 40); // 0.35 到 1.0 之间
                        let baseSpeed = 0.15 + distanceFactor * 0.15; 
                        
                        // 加入极小的神经随机波动
                        baseSpeed += (Math.random() - 0.5) * 0.02;
                        
                        // 限制最高和最低速度，防止过慢或过快
                        baseSpeed = Math.max(0.12, Math.min(0.35, baseSpeed));

                        pL.saccadeSpeed = baseSpeed;
                        pR.saccadeSpeed = baseSpeed - 0.015; // 右眼稍微慢一点点
                        
                        lastSaccadeTime = time;
                    }
                    speedL = pL.saccadeSpeed || 0.3; 
                    speedR = pR.saccadeSpeed || 0.3; 
                    }
                    break;
                    
                case 3: // Smooth Pursuit
                    if (t < 200 || t > 6200) {
                        pursuit.tx = 0; pursuit.ty = 0;
                        pursuit.speed = 0.1; // 较快平滑回中
                    } else {
                        // 随机生成新的目标点
                        if (time > pursuit.nextTime) {
                            // 使用极坐标生成目标，保证最低位移幅度 (半径至少20)，避免在中心小幅度徘徊
                            let angle = Math.random() * Math.PI * 2;
                            let radius = 20 + Math.random() * 20; 
                            pursuit.tx = Math.cos(angle) * radius;
                            pursuit.ty = Math.sin(angle) * radius;
                            
                            pursuit.nextTime = time + 600 + Math.random() * 1500; // 稍微加快目标改变的频率
                            // 每次生成新目标时，赋予一个随机的移动速度，让速度变化更显著
                            pursuit.speed = 0.01 + Math.random() * 0.04; // 速度在极慢(0.01)到较快(0.05)之间随机
                        }
                    }
                    // 虚拟目标进行平滑的插值游走
                    pursuit.x = lerp(pursuit.x, pursuit.tx, pursuit.speed || 0.015);
                    pursuit.y = lerp(pursuit.y, pursuit.ty, pursuit.speed || 0.015);
                    
                    // 左右眼追踪虚拟目标
                    pL.tx = pursuit.x;
                    pL.ty = pursuit.y;
                    pR.tx = pursuit.x; 
                    pR.ty = pursuit.y;
                    // 提高眼球自身的物理跟随响应速度，让追视更敏捷
                    speedL = speedR = 0.15; 
                    break;

                case 4: // VOR
                case 6: // Saccade + Fixation
                case 9: // Panic Saccades
                    // 为了代码精简和匹配现有的 5 个模式，把这些废弃模式也赋予一个基础回中
                    pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                    speedL = speedR = 0.2;
                    break;

                case 8: // Sleepy Drift
                    let env8 = 1;
                    if (t < 300) env8 = 0;
                    else if (t < 800) env8 = (t - 300) / 500;
                    else if (t > 3700) env8 = 0;
                    else if (t > 3200) env8 = (3700 - t) / 500;

                    // 修改为向下沉降 (ty 设为正值)，伴随极其缓慢的漂浮感
                    pL.tx = -5 * env8; pL.ty = (35 + Math.sin(time/1200)*8) * env8;
                    pR.tx = 5 * env8; pR.ty = (35 + Math.sin(time/1200)*8) * env8;
                    speedL = speedR = 0.05; 
                    break;

                case 10: // Playful Tech (Derp)
                    let env10 = 1;
                    if (t < 300) env10 = 0;
                    else if (t < 800) env10 = (t - 300) / 500;
                    else if (t > 3700) env10 = 0;
                    else if (t > 3200) env10 = (3700 - t) / 500;

                    // 增加旋转幅度 (从20增加到35) 和基础内聚程度 (从±20增加到±25)
                    // 加快旋转速度 (time的除数从300减小到200)
                    pL.tx = (Math.sin(time/200) * 35 + 25) * env10; 
                    pL.ty = (Math.cos(time/200) * 35) * env10;
                    pR.tx = (Math.sin(time/200 + Math.PI) * 35 - 25) * env10; 
                    pR.ty = (Math.cos(time/200 + Math.PI) * 35) * env10;
                    // 提高眼球跟随速度
                    speedL = speedR = 0.25;
                    break;
                    
                case 13: // Flutter / Opsoclonus
                    if (t < 200) {
                        // 首帧安全区：强制居中，无缩放
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        noiseAmp = 1.0; speedL = speedR = 0.2; scaleL = scaleR = 1;
                    } else if (t < 1200) {
                        // 涣散期间：在1秒内快速向两边斜上方漂移分离
                        let progress = (t - 200) / 1000; // 0 到 1 的进度
                        pL.tx = -25 * progress; // 左眼向左上方飘
                        pL.ty = -20 * progress;
                        pR.tx = 25 * progress; // 右眼向右上方飘
                        pR.ty = -20 * progress;
                        speedL = speedR = 0.05; // 稍微加快漂移速度
                        noiseAmp = 0; // 取消微颤，呈现彻底死寂的散焦感
                        scaleL = scaleR = 1 + (0.15 * progress); // 瞳孔随着时间微微放大
                    } else if (t < 1500) {
                        // 抽搐期间：极高频剧烈抖动，瞳孔猛然收缩（惊吓/清醒）
                        pL.tx = Math.sin(time/15) * 20;
                        pL.ty = Math.cos(time/12) * 15;
                        pR.tx = Math.sin(time/15) * 20;
                        pR.ty = Math.cos(time/12) * 15;
                        speedL = speedR = 0.9;
                        scaleL = scaleR = 0.7; // 瞳孔急剧缩小
                    } else {
                        // 尾部安全区：强制居中，无缩放
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        noiseAmp = 1.0; // 正常的微颤
                        speedL = speedR = 0.2;
                        scaleL = scaleR = 1;
                    }
                    
                    // 将缩放状态存入对象中供后面更新DOM使用
                    pL.scale = lerp(pL.scale || 1, scaleL, 0.1);
                    pR.scale = lerp(pR.scale || 1, scaleR, 0.1);
                    break;

                case 15: // Guilty
                    // 2000ms loop
                    if (t < 200 || t > 1800) {
                        // 首尾帧安全区：强制居中对齐
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                    } else if (t < 400) {
                        // 迅速下沉
                        pL.tx = 0; pL.ty = 30; pR.tx = 0; pR.ty = 30;
                        speedL = speedR = 0.4;
                    } else if (t < 1600) {
                        // 底部快速左右滑动1次 (2个半波 = 1个完整正弦波)
                        let slideProgress = (t - 400) / 1200; // 0 to 1
                        let slideX = Math.sin(slideProgress * Math.PI * 2) * 25;
                        pL.tx = slideX; pL.ty = 30;
                        pR.tx = slideX; pR.ty = 30;
                        speedL = speedR = 0.2;
                    } else {
                        // 迅速归位
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.3;
                    }
                    break;

                case 17: // Terrified / Cornered
                    // 2000ms loop
                    if (t < 200 || t > 1800) {
                        // 首尾帧安全区
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        scaleL = scaleR = 1;
                        noiseAmp = 0;
                        speedL = speedR = 0.2;
                    } else {
                        // 躲在右下角，紧紧靠在一起
                        pL.tx = 25; pL.ty = 25;
                        pR.tx = 35; pR.ty = 35; 
                        
                        scaleL = scaleR = 0.85; // 瞳孔再大一点点 (从0.7提升到0.85)
                        noiseAmp = 2.5; // 更明显的剧烈颤抖
                        speedL = speedR = 0.8; // 提高速度以响应更高频的噪音
                    }
                    pL.scale = lerp(pL.scale || 1, scaleL, 0.1);
                    pR.scale = lerp(pR.scale || 1, scaleR, 0.1);
                    break;

                case 18: // Double Take
                    if (t < 200 || t > 3800) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        scaleL = scaleR = 1;
                        speedL = speedR = 0.2;
                    } else if (t < 800) {
                        // 阶段一：看一眼 (普通扫视速度)
                        pL.tx = 30; pL.ty = -10;
                        pR.tx = 30; pR.ty = -10;
                        scaleL = scaleR = 1;
                        speedL = speedR = 0.25;
                    } else if (t < 1600) {
                        // 阶段二：平淡收回 (极慢)
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.05;
                    } else if (t < 1700) {
                        // 阶段三预备：大脑宕机 0.1秒
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0;
                    } else if (t < 2500) {
                        // 阶段三爆发：零帧起手，砸向右边，放大并回弹
                        let impact = (t - 1700) / 800; // 0 to 1
                        let overshoot = Math.exp(-impact * 5) * Math.cos(impact * 20); // 阻尼震荡
                        
                        pL.tx = 35 + overshoot * 15; pL.ty = -10;
                        pR.tx = 35 + overshoot * 15; pR.ty = -10;
                        
                        scaleL = scaleR = 1.4 + overshoot * 0.4;
                        speedL = speedR = 0.9; // 几乎瞬移
                    } else {
                        // 恢复正常但保持在右边
                        pL.tx = 30; pL.ty = -10; pR.tx = 30; pR.ty = -10;
                        scaleL = scaleR = 1.2;
                        speedL = speedR = 0.1;
                    }
                    pL.scale = lerp(pL.scale || 1, scaleL, 0.3); // 允许快速缩放
                    pR.scale = lerp(pR.scale || 1, scaleR, 0.3);
                    break;

                case 19: // Toon Bounce
                    if (t < 200 || t > 3800) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                    } else {
                        let cycle = Math.floor((t - 200) / 1200); // 3 cycles
                        let cycleT = ((t - 200) % 1200) / 1200; // 0 to 1
                        
                        let targetX = cycle === 1 ? -25 : (cycle === 2 ? 0 : 25);
                        let targetY = cycle === 1 ? 15 : (cycle === 2 ? 0 : 15);
                        
                        let spring = Math.exp(-cycleT * 6) * Math.cos(cycleT * 25); // 弹簧公式
                        
                        // 核心：将弹簧值直接叠加到目标位置上
                        pL.tx = targetX - spring * 20; // 反向overshoot
                        pL.ty = targetY - spring * 20;
                        pR.tx = targetX - spring * 20;
                        pR.ty = targetY - spring * 20;
                        
                        speedL = speedR = 0.4; // 较快的跟随速度以体现弹簧感
                    }
                    break;

                case 20: // Love Struck
                    if (t < 200 || t > 3800) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        scaleL = scaleR = 1;
                        speedL = speedR = 0.1;
                    } else {
                        let floatProgress = (t - 200) / 3600; // 0 to 1
                        
                        // 极其缓慢放大
                        scaleL = scaleR = 1 + floatProgress * 0.8; // 放大到 1.8
                        
                        // 波浪线向上漂浮
                        pL.tx = Math.sin(floatProgress * Math.PI * 6) * 15;
                        pL.ty = -floatProgress * 30; // 持续向上
                        pR.tx = Math.sin(floatProgress * Math.PI * 6) * 15;
                        pR.ty = -floatProgress * 30;
                        
                        speedL = speedR = 0.05; // 极慢
                    }
                    pL.scale = lerp(pL.scale || 1, scaleL, 0.05);
                    pR.scale = lerp(pR.scale || 1, scaleR, 0.05);
                    break;

                case 21: // Bonked
                    if (t < 200 || t > 3800) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        scaleL = scaleR = 1;
                        speedL = speedR = 0.2;
                    } else {
                        // 画圈，相位错开 (左眼快，右眼慢)
                        let speed1 = time / 150;
                        let speed2 = time / 200;
                        
                        pL.tx = Math.cos(speed1) * 25;
                        pL.ty = Math.sin(speed1) * 25;
                        
                        pR.tx = Math.cos(speed2) * 25;
                        pR.ty = Math.sin(speed2) * 25;
                        
                        // 不规则缩放
                        scaleL = 1 + Math.sin(time / 100) * 0.3;
                        scaleR = 1 + Math.cos(time / 120) * 0.3;
                        
                        speedL = speedR = 0.3;
                    }
                    pL.scale = lerp(pL.scale || 1, scaleL, 0.2);
                    pR.scale = lerp(pR.scale || 1, scaleR, 0.2);
                    break;

                case 22: // Zip (Squash & Stretch)
                    if (t < 200 || t > 3800) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        scaleL = scaleR = 1;
                        speedL = speedR = 0.2;
                        noiseAmp = 0;
                    } else if (t < 900) {
                        // 预备动作：向左上方蓄力，瞳孔缩小 (Squash)，伴随高频剧烈抖动
                        pL.tx = -25; pL.ty = -25; pR.tx = -25; pR.ty = -25;
                        scaleL = scaleR = 0.8; // 蓄力阶段眼珠稍微大一些 (从0.6提升到0.8)
                        // 必须调高跟随速度，否则抖动效果会被低速过滤掉
                        speedL = speedR = 0.8; 
                        noiseAmp = 2.5; // 与弱小无助同级别的极限抖动
                    } else if (t < 2100) {
                        // 极速冲刺到右下角并带有强烈的阻尼回弹 (Stretch + Spring)
                        let zipProgress = (t - 900) / 1200; // 0 to 1，时间拉长让回弹更慢更充分
                        // 减小阻尼系数和频率，让回弹幅度更大、速度更慢
                        let overshoot = Math.exp(-zipProgress * 4) * Math.cos(zipProgress * 20);
                        
                        pL.tx = 25 + overshoot * 20; pL.ty = 25 + overshoot * 20;
                        pR.tx = 25 + overshoot * 20; pR.ty = 25 + overshoot * 20;
                        
                        scaleL = scaleR = 1.0;
                        speedL = speedR = 0.9; // 几乎瞬移
                        noiseAmp = 0; // 冲刺时停止抖动
                    } else {
                        // 回弹结束后直接平滑归位到中心
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.1; // 平滑缓慢地归位
                        noiseAmp = 0;
                    }
                    pL.scale = lerp(pL.scale || 1, scaleL, 0.4); // 快速响应缩放
                    pR.scale = lerp(pR.scale || 1, scaleR, 0.4);
                    break;

                case 24: // Typewriter
                    if (t < 200 || t >= 6200) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                    } else {
                        let readTime = t - 200; // 0 to 6000
                        if (readTime > 5999) readTime = 5999; // 严格防止溢出导致的左下角抖动
                        let lineTime = 2000; // 每一行的时间 (一共3行)
                        let lineIndex = Math.floor(readTime / lineTime); // 0, 1, 2
                        let lineT = readTime % lineTime; // 0 to 1999
                        
                        // Y坐标根据行数变化：第一行-15，第二行0，第三行15
                        let yPos = -15 + lineIndex * 15;
                        
                        if (lineT < 1600) { 
                            // 阶梯状向右阅读 (顿顿顿顿)
                            let steps = 6;
                            let currentStep = Math.floor((lineT / 1600) * steps);
                            let xPos = -25 + (currentStep / (steps - 1)) * 50; // -25 到 25
                            pL.tx = xPos; pL.ty = yPos;
                            pR.tx = xPos; pR.ty = yPos;
                            speedL = speedR = 0.6; // 短促的快速跳跃
                        } else { 
                            // 回车键 (Carriage Return)
                            if (lineIndex < 2) {
                                // 前两行，极其平滑地滑回左侧下一行
                                pL.tx = -25; pL.ty = yPos + 15; 
                                pR.tx = -25; pR.ty = yPos + 15;
                                speedL = speedR = 0.05; // 更加平滑缓慢的滑动回车
                            } else {
                                // 最后一行读完，直接平滑归位到中心
                                pL.tx = 0; pL.ty = 0; 
                                pR.tx = 0; pR.ty = 0;
                                speedL = speedR = 0.05; 
                            }
                        }
                    }
                    break;

                case 26: // Ping-Pong
                    if (t < 200 || t > 3800) {
                        pL.tx = 0; pL.ty = 0; pR.tx = 0; pR.ty = 0;
                        speedL = speedR = 0.2;
                    } else {
                        let matchTime = t - 200; // 0 to 3600
                        let side = 1;
                        
                        // 频率随着时间越来越快
                        let interval;
                        if (matchTime < 1000) interval = 500;
                        else if (matchTime < 2000) interval = 250;
                        else if (matchTime < 2800) interval = 125;
                        else interval = 60; // 最终疯狂状态
                        
                        let step = Math.floor(matchTime / interval);
                        side = (step % 2 === 0) ? 1 : -1;
                        
                        if (matchTime > 2800) {
                            // 最终崩溃，胡乱转动
                            pL.tx = Math.random() * 20 - 10; pL.ty = Math.random() * 20 - 10;
                            pR.tx = Math.random() * 20 - 10; pR.ty = Math.random() * 20 - 10;
                            speedL = speedR = 0.8;
                        } else {
                            // 左右来回看
                            pL.tx = side * 30; pL.ty = 0;
                            pR.tx = side * 30; pR.ty = 0;
                            speedL = speedR = 0.5;
                        }
                    }
                    break;
            }

            // Head update
            head.x = lerp(head.x, head.tx, headSpeed);
            head.y = lerp(head.y, head.ty, headSpeed);
            headContainer.style.transform = `translate(${head.x}px, ${head.y}px)`;

            // Pupils update
            pL.x = lerp(pL.x, pL.tx + getNoise(noiseAmp), speedL);
            pL.y = lerp(pL.y, pL.ty + getNoise(noiseAmp), speedL);
            pR.x = lerp(pR.x, pR.tx + getNoise(noiseAmp), speedR);
            pR.y = lerp(pR.y, pR.ty + getNoise(noiseAmp), speedR);

            // Circular constraint
            function constrain(p) {
                let dist = Math.sqrt(p.x*p.x + p.y*p.y);
                if (dist > 40) {
                    p.x = (p.x / dist) * 40;
                    p.y = (p.y / dist) * 40;
                }
            }
            constrain(pL); constrain(pR);

            pupilL.style.transform = `translate(${pL.x}px, ${pL.y}px) scale(${pL.scale || 1})`;
            pupilR.style.transform = `translate(${pR.x}px, ${pR.y}px) scale(${pR.scale || 1})`;

            // 联动眼白位移 (视差效果)
            // 增加移动幅度到 22% (0.22)，当眼珠极限位移(40px)时，眼白位移约 8.8px
            // 超过原本的 8px 间距，从而在极限状态下让眼白“撞”到眼眶外沿，产生非常挤压、张力拉满的滑稽感
            let parallaxRatio = 0.22;
            pupilL.parentElement.style.setProperty('--sclera-x', `${pL.x * parallaxRatio}px`);
            pupilL.parentElement.style.setProperty('--sclera-y', `${pL.y * parallaxRatio}px`);
            pupilR.parentElement.style.setProperty('--sclera-x', `${pR.x * parallaxRatio}px`);
            pupilR.parentElement.style.setProperty('--sclera-y', `${pR.y * parallaxRatio}px`);
        }

        let lastTime = performance.now();
        function loop(now) {
            let dt = now - lastTime;
            lastTime = now;
            updateLogic(dt);
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);

        function triggerBlink(duration) {
            document.querySelectorAll('.eye').forEach(eye => {
                eye.classList.remove('is-blinking');
                void eye.offsetWidth; 
                eye.style.setProperty('--blink-dur', (duration/1000) + 's');
                eye.classList.add('is-blinking');
                setTimeout(() => {
                    eye.classList.remove('is-blinking');
                }, duration + 50); 
            });
        }
    </script>
</body>
